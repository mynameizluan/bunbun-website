name: Build & Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Có CNAME (domain riêng) → build ở gốc; không có → base path /bunbun-website
      - name: Build static export
        run: |
          if [ -s CNAME ]; then
            echo "Custom domain: $(cat CNAME) — build không base path"
            STATIC_EXPORT=1 npm run build
          else
            echo "Chưa có domain riêng — build với base path /bunbun-website"
            STATIC_EXPORT=1 PAGES_BASE_PATH=/bunbun-website NEXT_PUBLIC_BASE_PATH=/bunbun-website npm run build
          fi

      - name: Publish to gh-pages
        run: |
          [ -s CNAME ] && cp CNAME out/CNAME
          touch out/.nojekyll
          cd out
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
